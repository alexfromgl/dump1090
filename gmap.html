<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no">
    <title>Flights Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <!-- Canvas for Leaflet map -->
    <div id="canvas" class="map"></div>

    <!-- Active flights panel -->
    <div class="flights-panel" id="flights-panel">
        <div class="flights-panel__header">
            <h1 class="flights-panel__title">Active flights</h1>
            <span class="flights-panel__count" id="flights-count">0</span>
        </div>
        <div class="flights-panel__body">
            <table class="flights-table">
                <thead>
                    <tr>
                        <th>Flight</th>
                        <th>Alt.</th>
                        <th>Speed</th>
                        <th>Heading</th>
                        <th>Coordinates</th>
                    </tr>
                </thead>
                <tbody id="flights-table-body">
                    <tr>
                        <td colspan="5" class="flights-table__empty">Waiting for aircraft…</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Floating info panel -->
    <div class="info-panel" id="info-panel">
        <div class="info-panel__header">
            <h1 class="info-panel__title">Last Update: <span id="lastUpdate"></span></h1>
        </div>
        <div class="info-panel__content">
            <p id="planeInfo" class="info-panel__text">Click on a plane for info</p>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs@1.10.27/dist/interact.min.js"></script>
    <script src="/script.js"></script>
</body>

</html>
